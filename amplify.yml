version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Installing frontend dependencies..."
            - npm ci
            - echo "Installing TypeScript dependencies explicitly..."
            - npm install typescript @types/node @types/react @types/react-dom --save-dev
        build:
          commands:
            - echo "Building frontend..."
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
      buildImage: amplify:al2023 